name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: install
        run: npm ci

      - name: typecheck
        run: npx tsc --noEmit

      - name: test
        # The Codex integration test runs only when OPENAI_API_KEY is set
        # via the OPENAI_API_KEY repo secret. The Cursor live test is
        # gated on CURSOR_AGENT_LIVE=1 and never runs in CI.
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npx vitest run

      - name: build
        run: npx tsc
